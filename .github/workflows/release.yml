name: offline-release-candidate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Validate support matrix contract
        run: python tools/release/validate_support_matrix.py --support-matrix docs/adapters/support-matrix.md --profile plans/standalone-v1/.agent-plan/standalone-v1/ci-matrix-profile.v2.json --evidence plans/standalone-v1/evidence/ws-14/support-matrix-contract.json
      - name: Validate deferred promotion contract
        run: python tools/release/validate_deferred_promotion.py --profile plans/standalone-v1/.agent-plan/standalone-v1/benchmark-authority-profile.v1.json --evidence plans/standalone-v1/evidence/ws-14/deferred-promotion-contract.json
      - name: Assemble offline candidate
        run: python tools/release/assemble_release_candidate.py --manifest plans/standalone-v1/plan.manifest.json --inventory release/candidate/inventory.json --evidence plans/standalone-v1/evidence/ws-14/release-assembly.json
      - name: Verify offline candidate
        run: python tools/release/verify_release_candidate.py --inventory release/candidate/inventory.json --evidence plans/standalone-v1/evidence/ws-14/release-verification.json
